interface:
  display_name: "Hwamony Skill Lab"
  short_description: "Run auditable baseline-vs-mutation eval loops so a skill gets better with evidence instead of vibes"
  default_prompt: "Use $hwamony-skill-lab to draft one bounded mutation for this skill, show me the plan and rubric before execution, run baseline and mutation on fixed shards, and keep the change only if evaluator-majority says it genuinely beat baseline."
